    journal:

  # ── Foundation skills ───────────────────────────────────────────────────────
  # Patterns for general software engineering, cloud, and frontend evidence.
  # Trust tiers apply normally: .php, .rb, .go are semi_trusted (arch+behavioral
  # only); .sh is semi_trusted; .yaml/.toml/.tf are trusted.
  # These patterns intentionally avoid AI/ML terms so they don't inflate AI skills.

  foundation.testing:
    github:
      strong:
        - pattern: "def test_|class Test.*:|@pytest\\.fixture|pytest\\.mark\\."
          description: pytest test functions or fixtures
        - pattern: "describe\\(['\"]|it\\(['\"].*=>|beforeEach\\(|afterEach\\("
          description: Jest/Mocha/Jasmine test blocks
        - pattern: "\\bPHPUnit\\\\|extends TestCase|public function test"
          description: PHPUnit test class
        - pattern: "tests?/.*\\.py|spec/.*\\.rb|__tests__/|test_.*\\.php"
          description: Test file path conventions
          file_scope: path_only
      moderate:
        - pattern: "assertEqual|assertRaises|assert_called_with|assert_equal"
          description: Test assertions
        - pattern: "mock\\.patch|MagicMock\\(|mocker\\.patch|sinon\\.stub"
          description: Mocking in tests
        - pattern: "\\.toEqual\\(|\\.toBe\\(|\\.toHaveBeenCalled"
          description: Jest/Jasmine matchers

  foundation.code_quality:
    github:
      strong:
        - pattern: "\\.github/workflows/.*\\.(yml|yaml)"
          description: GitHub Actions workflow file path
          file_scope: path_only
        - pattern: "on:\\s*\\n.*push:|jobs:\\s*\\n|runs-on:"
          description: GitHub Actions workflow structure
        - pattern: "\\.gitlab-ci\\.yml|Jenkinsfile|CircleCI|bitbucket-pipelines"
          description: CI/CD pipeline config file
          file_scope: path_only
      moderate:
        - pattern: "ruff|flake8|eslint|pylint|rubocop|phpcs"
          description: Linter usage
        - pattern: "mypy|pyright|tsc --noEmit|phpstan|psalm"
          description: Type checker usage
        - pattern: "black --check|prettier --check|gofmt"
          description: Formatter check in CI

  foundation.backend:
    github:
      strong:
        - pattern: "@app\\.route|@router\\.|app\\.get\\(|app\\.post\\(|app\\.put\\("
          description: REST route definitions (Flask/FastAPI/Express)
        - pattern: "session_start\\(|\\$_POST\\[|\\$_GET\\[|\\$_FILES\\["
          description: PHP server-side request handling
        - pattern: "require.*vendor/autoload|use Aws\\\\|use Laravel\\\\"
          description: PHP Composer autoload / framework import
        - pattern: "func\\s+\\w+.*http\\.ResponseWriter|func\\s+\\w+.*gin\\.Context"
          description: Go HTTP handler
      moderate:
        - pattern: "\\$_POST\\['|\\$_GET\\['|header\\('Content-Type|json_encode\\("
          description: PHP HTTP response/request handling
        - pattern: "request\\.json\\(|request\\.form\\[|jsonify\\("
          description: Flask request parsing
        - pattern: "res\\.json\\(|req\\.body\\.|res\\.status\\("
          description: Express.js response patterns

  foundation.databases:
    github:
      strong:
        - pattern: "mysqli_connect\\(|new PDO\\(|\\$link\\s*=.*connect"
          description: PHP database connection
        - pattern: "INSERT INTO|SELECT.*FROM.*WHERE|CREATE TABLE|ALTER TABLE"
          description: SQL statements in code
        - pattern: "db\\.execute\\(|cursor\\.execute\\(|session\\.query\\("
          description: Database query execution (Python ORM / raw)
        - pattern: "aws rds|RdsClient|rds\\.describeDBInstances"
          description: AWS RDS API usage
      moderate:
        - pattern: "prepare\\(.*sql|bind_param\\(|stmt\\.execute\\("
          description: Prepared statements (SQL injection prevention)
        - pattern: "mysqli_query\\(|mysqli_fetch_assoc\\(|mysqli_num_rows"
          description: PHP MySQL functions
        - pattern: "createEngine\\(|sessionmaker\\(|Base\\.metadata\\.create_all"
          description: SQLAlchemy ORM setup

  foundation.cloud_services:
    github:
      strong:
        - pattern: "boto3\\.client\\(|boto3\\.resource\\(|import boto3"
          description: AWS boto3 SDK import/usage
        - pattern: "Aws\\\\S3\\\\S3Client|Aws\\\\Sns\\\\SnsClient|Aws\\\\Rds\\\\RdsClient|Aws\\\\Ec2"
          description: PHP AWS SDK class usage
        - pattern: "aws\\s+(s3|ec2|rds|sns|elb|lambda|iam|cloudwatch|autoscaling)\\s+"
          description: AWS CLI command
        - pattern: "google\\.cloud\\.|from google\\.cloud import|@google-cloud/"
          description: GCP SDK usage
        - pattern: "DefaultAzureCredential|azure\\.storage|azure\\.identity"
          description: Azure SDK usage
      moderate:
        - pattern: "s3\\.createBucket|s3\\.putObject|s3\\.getObject|createBucket\\("
          description: S3 bucket operations
        - pattern: "ec2\\.terminate-instances|ec2\\.run-instances|describe-instances"
          description: EC2 instance management
        - pattern: "SnsClient.*factory|createTopic|sns\\.subscribe|sns create-topic"
          description: SNS topic and subscription
        - pattern: "elb.*describe-load-balancers|autoscaling.*describe"
          description: ELB/autoscaling management

  foundation.containers:
    github:
      strong:
        - pattern: "^FROM\\s+\\w|^RUN\\s+|^CMD\\s+|^ENTRYPOINT\\s+"
          description: Dockerfile instructions
        - pattern: "Dockerfile$|docker-compose\\.yml$|docker-compose\\.yaml$"
          description: Docker config file path
          file_scope: path_only
        - pattern: "services:\\s*\\n.*image:|version:\\s*['\"]?[23]"
          description: docker-compose service definitions
      moderate:
        - pattern: "docker build|docker run|docker push|docker pull"
          description: Docker CLI commands
        - pattern: "EXPOSE\\s+\\d+|ENV\\s+\\w+|WORKDIR\\s+/"
          description: Dockerfile environment setup

  foundation.frontend:
    github:
      strong:
        - pattern: "<!DOCTYPE html>|<html.*lang=|<head>.*<title>"
          description: HTML document structure
        - pattern: "import React|from 'react'|from \"react\""
          description: React import
        - pattern: "import.*from 'vue'|createApp\\(|Vue\\.component\\("
          description: Vue.js usage
      moderate:
        - pattern: "\\$\\(document\\)\\.ready|\\$\\('#|\\$\\('\\.|\\.on\\('click"
          description: jQuery DOM manipulation
        - pattern: "<form.*action=|<input.*type=|<button.*type="
          description: HTML form elements
        - pattern: "fetch\\(|axios\\.|XMLHttpRequest|\\$\\.ajax\\("
          description: Frontend HTTP requests
      keywords: [production debugging, trace inspection, failure analysis, debug LLM, trace replay, root cause]
