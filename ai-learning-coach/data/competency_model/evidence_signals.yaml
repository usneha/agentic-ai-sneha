# Evidence signal definitions — Evidence Validation v2
#
# DESIGN PRINCIPLE: Evidence is behavioral, not lexical.
# A skill is credited when the repo contains deliberate design decisions,
# not when it mentions a related word. A match in vendored JS or a generic
# Python import does not constitute skill evidence.
#
# Evidence maturity levels (renamed from strong/moderate/weak):
#   architectural: +0.35  File/directory structure proves a design decision.
#                         Hard to false-positive. Examples: dedicated prompts/
#                         directory, a Dockerfile, a LangGraph StateGraph.
#   behavioral:    +0.20  Code that does something AI-specific: instantiates a
#                         framework class, calls an API with domain-relevant args,
#                         configures a component. Must appear in a trusted file.
#   contextual:    +0.05  Import or reference to a specific library in a project-
#                         owned file. Insufficient alone — only adds score when
#                         at least one behavioral or architectural match also exists.
#
# Stacking rules:
#   - contextual alone: skill marked as pending, zero score credit
#   - contextual + behavioral: +0.25 total
#   - behavioral alone: +0.20
#   - architectural alone: +0.35
#   - architectural + behavioral: +0.55 (cap per repo)
#   - contextual does NOT add when architectural is already present
#
# File trust tiers (enforced by scanner):
#   trusted:      .py, .ipynb, .ts, .tsx, .yaml, .yml, .toml, .md,
#                 Dockerfile, Makefile, docker-compose.yml, .env.example
#                 → all three levels run against these
#   semi_trusted: .js, .jsx, .sh, .json (non-vendor, non-minified)
#                 → architectural and behavioral only; no contextual
#   excluded:     anything under vendor dirs or with excluded suffixes
#                 → nothing runs against these
#
# Vendor exclusion (enforced by scanner):
#   dirs:    jquery, vendor, bower_components, lib, libs, third_party,
#            static/js, static/css, public, external, deps, wwwroot
#   suffixes: .min.js, .min.css, .bundle.js, .chunk.js
#   files:   package-lock.json, yarn.lock, poetry.lock (already skipped)
#
# Minimum evidence requirement:
#   A skill receives zero score until at least one behavioral or architectural
#   match is found in a trusted or semi-trusted file. Contextual-only signals
#   are held as "pending" and not passed to the assessor.
#   Exception: infrastructure skills (deployment.containers, deployment.cicd)
#   may be credited on architectural (path) evidence alone.

source_weights:
  github_strong: 0.35    # architectural
  github_moderate: 0.20  # behavioral
  github_weak: 0.05      # contextual (only emitted when behavioral also present)
  journal_built_unverified: 0.25
  journal_course_completed: 0.15
  journal_self_assessed: 0.10
  journal_struggled: -0.05
  journal_reflection_insight: 0.05

bonuses:
  breadth: 0.15        # skill in 3+ repos
  integration: 0.10    # co-dependent skills in same repo

decay:
  trigger_days: 90
  rate_per_30_days: 0.05
  floor_level: emerging      # 0.20
  exempt_above: demonstrated # 0.60 — demonstrated+ does not decay

score_thresholds:
  no_evidence: 0.0
  emerging: 0.20
  developing: 0.40
  demonstrated: 0.60
  strong: 0.80

confidence_rules:
  # v2: confidence reflects trust quality, not just quantity
  - evidence: contextual_only
    confidence: none          # not credited
  - evidence: behavioral_single_file
    confidence: low
  - evidence: behavioral_multi_file
    confidence: medium
  - evidence: architectural_only
    confidence: medium
  - evidence: architectural_plus_behavioral
    confidence: high
  - evidence: multi_repo
    confidence: high

---

skills:

  prompting.basic:
    github:
      strong:
        - pattern: "prompts/"
          description: Dedicated prompts directory
          file_scope: path_only
        - pattern: "prompt_.*\\.py|prompt_.*\\.txt|prompt_.*\\.md"
          description: Named prompt files indicating intentional prompt management
          file_scope: path_only
        - pattern: "SYSTEM_PROMPT\\s*=|system_prompt\\s*=|SystemMessage\\("
          description: Named, reusable system prompt constants
      moderate:
        - pattern: "\"role\":\\s*\"system\"|'role':\\s*'system'"
          description: Role-based message structure
        - pattern: "messages\\s*=\\s*\\[.*role.*system"
          description: Message array with system role
        - pattern: "f\".*\\{.*\\}.*prompt|PromptTemplate\\("
          description: Dynamic prompt construction with templating library
      weak:
        - pattern: "from langchain.*prompts import|from anthropic import"
          description: LLM framework import in project file
    journal:
      keywords: [prompt, prompting, system prompt, few-shot, instruction, role, user message, assistant message]

  prompting.system:
